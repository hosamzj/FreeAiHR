version: '3.9'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - DATABASE_URL=${DATABASE_URL}
        - JWT_SECRET=${JWT_SECRET}
    container_name: ai-recruit-app
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - JWT_SECRET=${JWT_SECRET}
      - NODE_ENV=production
      - NEXT_PUBLIC_ENABLE_DEMO=false
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/api/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    networks:
      - ai-recruit-network

  db:
    image: postgres:16-alpine
    container_name: ai-recruit-db
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=recruit
      - POSTGRES_PASSWORD=recruit_password
      - POSTGRES_DB=ai_recruit
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U recruit -d ai_recruit"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - ai-recruit-network

volumes:
  postgres_data:

networks:
  ai-recruit-network:
    driver: bridge
